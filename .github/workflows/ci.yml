name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    # macos-15 ships Xcode 16.x, whose SDK marks SwiftUI's View protocol
    # @MainActor — the isolation model this codebase is written against.
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen & xcbeautify
        # xcbeautify must actually exist: with `set -o pipefail`, piping into a
        # missing binary fails the pipe and the `||` fallback used to re-run
        # the whole build+test a SECOND time.
        run: brew install xcodegen xcbeautify

      - name: Generate project
        run: |
          xcodegen generate
          # Belt and braces: newer XcodeGen releases can emit a project format
          # (objectVersion 77, Xcode 16.3+) that Xcode 15.4 refuses to open.
          # Normalize to the Xcode 14/15 format; harmless when already 56.
          sed -i '' -E 's/objectVersion = [0-9]+;/objectVersion = 56;/' \
            SkipperLogbook.xcodeproj/project.pbxproj
          grep -m1 'objectVersion' SkipperLogbook.xcodeproj/project.pbxproj

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild \
            -project SkipperLogbook.xcodeproj \
            -scheme SkipperLogbook \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            clean build test | xcbeautify || xcodebuild \
            -project SkipperLogbook.xcodeproj \
            -scheme SkipperLogbook \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            clean build test

  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        # Strict and allowed to fail the job — a linter that can't go red is
        # decoration. The xcode reporter puts file:line for EVERY violation in
        # the log (GitHub annotations cap at 10 and swallow the rest).
        run: swiftlint --strict --reporter xcode
