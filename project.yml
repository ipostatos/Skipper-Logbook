name: SkipperLogbook

options:
  bundleIdPrefix: com.skipperlogbook
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.9.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  SkipperLogbook:
    type: application
    platform: iOS
    sources:
      - path: SkipperLogbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skipperlogbook.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_FILE: SkipperLogbook/Info.plist
        CODE_SIGN_ENTITLEMENTS: SkipperLogbook/SkipperLogbook.entitlements
    dependencies:
      - target: SkipperWidgets
        embed: true

  SkipperWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SkipperWidgets
      # Shared source files compiled into the widget target as well.
      - path: SkipperLogbook/Shared/Widget/VoyageSnapshot.swift
      - path: SkipperLogbook/Shared/Widget/VoyageActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skipperlogbook.app.widgets
        INFOPLIST_FILE: SkipperWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: SkipperWidgets/SkipperWidgets.entitlements
        SWIFT_EMIT_LOC_STRINGS: NO

  SkipperLogbookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SkipperLogbookTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skipperlogbook.app.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: SkipperLogbook

schemes:
  SkipperLogbook:
    build:
      targets:
        SkipperLogbook: all
        SkipperWidgets: all
        SkipperLogbookTests: [test]
    test:
      targets:
        - SkipperLogbookTests
